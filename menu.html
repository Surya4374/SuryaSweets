<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu – Surya Sweets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <a href="index.html" class="back-btn" aria-label="Back to Home">← Home</a>
        <a href="index.html" class="logo">Surya Sweets</a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <nav class="main-nav" id="mainNav">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <button type="button" class="cart-link cart-trigger" id="cartTrigger" aria-label="Open cart">🛒 <span id="cartCount">0</span></button>
        </nav>
    </header>

    <!-- Loading overlay when switching category -->
    <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
        <div class="loading-spinner"></div>
    </div>

    <main class="menu-page">
        <h2 id="categoryTitle" class="category-title"></h2>

        <!-- Search & category filters -->
        <div class="search-filters-wrap menu-filters">
            <div class="search-bar-wrap">
                <input type="text" id="searchProducts" placeholder="Search products..." aria-label="Search products">
            </div>
            <div class="category-filters" id="productCategoryFilters"></div>
        </div>

        <section class="categories products-grid" id="productContainer"></section>

        <!-- Desktop: order sidebar -->
        <aside class="order-sidebar" id="orderSidebar">
            <div class="order-summary">
                <h3>Your Order</h3>
                <ul id="orderList"></ul>
                <p class="grand-total-text">Grand Total: ₹<span id="grandTotal">0</span></p>
            </div>
            <div class="order-actions">
                <button id="clearCartBtn" class="btn btn-secondary">Clear Cart</button>
                <button id="checkoutBtn" class="checkout-btn">Checkout</button>
            </div>
        </aside>
    </main>

    <!-- Sliding cart panel -->
    <div class="cart-overlay" id="cartOverlay" aria-hidden="true"></div>
    <div class="cart-panel" id="cartPanel" role="dialog" aria-label="Cart">
        <div class="cart-panel-header">
            <h3>Your Cart</h3>
            <button type="button" class="cart-panel-close" id="cartPanelClose" aria-label="Close cart">×</button>
        </div>
        <div class="cart-panel-body" id="cartPanelBody"></div>
        <div class="cart-panel-footer">
            <p class="cart-panel-grand-total">Total: ₹<span id="cartPanelTotal">0</span></p>
            <div class="cart-panel-actions">
                <button type="button" id="clearCartPanelBtn" class="btn btn-secondary">Clear Cart</button>
                <a href="#" id="checkoutPanelBtn" class="checkout-btn btn">Checkout</a>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <script src="js/data.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/cart-panel.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
